# kairos.conf — Kairos default configuration
port=/dev/cu.usbmodem1101
window_size=100
min_samples=5
summary_interval=50
log_path=/tmp/kairos.log
anomaly_threshold=3.0

# HMI / Display
machine_id=MAKINE 01
line_id=HAT A
idle_timeout_s=35
autostart=false # Set to true to start Kairos mcu automatically data send mode without needing to press the start button on the HMI. Useful for testing and debugging.
